# Configuration file

blockedmods {
    # modids (FML) a bloquear; el cliente que los traiga es rechazado al entrar. OJO: la modlist del cliente es AUTO-REPORTADA y falsificable -> caza flojos, NO es barrera. [default: [xenobyte]]
    S:blocked <
        xenobyte
     >

    # Activar el bloqueo de mods de la lista negra en el handshake. [default: true]
    B:enabled=true

    # Razon que se loguea al rechazar. En 1.7.10 la pantalla del cliente la fija FML ('Mod rejections'). [default: Tienes un mod no permitido. Desinstalalo para entrar.]
    S:message=Tienes un mod no permitido. Desinstalalo para entrar.
}


bridge {
    # Cota de la cola de violaciones si el plugin no drena. [range: 16 ~ 100000, default: 500]
    I:maxQueued=500
}


debug {
    # Loguea CADA hit melee (atacante/victima/angulo/dist/ping/VL) a [AC-DBG] para verificar el hook y calibrar umbrales. Cambio requiere reiniciar. OFF en produccion (spamea el log). [default: false]
    B:debugLog=false
}


killaura {
    # FOV legitimo de melee, en grados.
    D:angleBaseDeg=80.0

    # Grados extra de holgura por ms de ping.
    D:anglePerMs=0.05

    # Victimas distintas en la ventana por encima de las cuales se considera aura. [range: 1 ~ 50, default: 3]
    I:multiMaxDistinct=3

    # Ventana base de multi-target, en ticks. [range: 1 ~ 100, default: 5]
    I:multiWindowTicks=5

    # Reach base permitido (vanilla ya capa ~6 en processUseEntity).
    D:reachBase=5.8

    # Reach extra por ms de ping.
    D:reachPerMs=0.003

    # Peso VL del check angulo/FOV.
    D:wAngle=5.0

    # Peso VL del check multi-target.
    D:wMulti=4.0

    # Peso VL del check reach.
    D:wReach=3.0
}


lagcomp {
    # Ticks de gracia tras login/respawn (sin checar). [range: 0 ~ 1200, default: 60]
    I:graceLoginTicks=60

    # Ticks de gracia tras teleport/cambio de dimension. [range: 0 ~ 1200, default: 20]
    I:graceTeleportTicks=20

    # Ticks de historial de posiciones por entidad (lag-comp). 20 = 1s. [range: 1 ~ 200, default: 40]
    I:historyTicks=40

    # MSPT promedio por encima del cual el server se considera laggeando (se pausan checks).
    D:serverLagMsptThreshold=55.0

    # Bloques movidos en 1 tick para tratarlo como teleport (IT, /tp, Whis).
    D:tpDist=10.0
}


lineofsight {
    # Activar el check de pegar a traves de pared. [default: true]
    B:losEnabled=true

    # Distancia minima para chequear LoS (evita FP a quemarropa).
    D:losMinDist=1.5

    # Posiciones de rewind (lag-comp) a probar antes de marcar sin-LoS. [range: 0 ~ 40, default: 3]
    I:losRewindSamples=3

    # Peso VL del check line-of-sight.
    D:wLos=6.0
}


violationlevel {
    # Maximo 1 reporte por este numero de ticks, por (jugador,check). [range: 0 ~ 200, default: 20]
    I:reportThrottleTicks=20

    # VL minimo para empezar a reportar.
    D:vlAlert=20.0

    # VL para el nivel BAN.
    D:vlBan=70.0

    # VL que decae por tick con juego limpio. 0.05 = ~1 VL/s.
    D:vlDecayPerTick=0.06

    # VL para el nivel KICK.
    D:vlKick=40.0
}


