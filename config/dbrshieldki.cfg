# Configuration file

general {
    # If true, creative-mode players never trigger shield logic. [default: true]
    B:bypassInCreative=true

    # Cooldown seconds applied after activate / deactivate / break. [range: 0 ~ 3600, default: 10]
    I:cooldownSeconds=10

    # Maximum shield level (also caps Usos). [range: 1 ~ 100, default: 10]
    I:maxLevel=10

    # Server-side cap on ToggleShieldPacket per player per second. [range: 1 ~ 100, default: 5]
    I:rateLimitPacketsPerSecond=5

    # Seconds per +1 Uso while shield is deactivated. [range: 1 ~ 3600, default: 10]
    I:regenIntervalSeconds=10
}


