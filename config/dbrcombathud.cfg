# Configuration file

colores {
    # Color RGB de la barra cuando vida > 50% (decimal)
    I:vidaAlta=3398963

    # Color RGB de la barra cuando vida <= 25% (decimal)
    I:vidaBaja=14496563

    # Color RGB de la barra cuando vida > 25% (decimal)
    I:vidaMedia=14535731
}


elementos {
    # Abreviar vida grande (1.5K, 2M, 1.2B)
    B:abreviarVida=true

    # Mostrar la lista de efectos
    B:mostrarEfectos=true

    # Mostrar el cuadro del nombre
    B:mostrarNombre=true

    # Mostrar el recuadro con la entidad
    B:mostrarRetrato=true

    # Mostrar la barra de vida
    B:mostrarVida=true

    # Tamano del recuadro del retrato en px
    I:tamRetrato=48

    # Zoom del modelo dentro del recuadro
    D:zoomRetrato=1.0
}


general {
    # Activa o desactiva el HUD de objetivo
    B:activado=true

    # Alcance del ray trace en bloques
    D:alcance=20.0

    # Segundos que el HUD mantiene el objetivo tras dejar de mirarlo (sticky)
    D:holdSegundos=0.25
}


posicion {
    # Escala global del HUD
    D:escala=1.0

    # X del ancla (esquina superior izquierda)
    I:posX=8

    # Y del ancla (mas abajo = mayor; evita la barra de ki/BP)
    I:posY=44
}


