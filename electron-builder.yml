appId: net.dbr.launcher
productName: Dbr Launcher
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.gitignore,README.md,tailwind.config.js,postcss.config.js}'
asar: true
compression: maximum
electronLanguages:
  - en-US
  - es
win:
  target: nsis
  artifactName: ${productName}-${version}-setup.${ext}
mac:
  target: dmg
  category: public.app-category.games
  artifactName: ${productName}-${version}.${ext}
linux:
  target: AppImage
  category: Game
  artifactName: ${productName}-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: jmpz2026
  repo: DbrLauncher
